name: Setup Solana toolchain
description: Install the Anza Solana toolchain pinned to a specific version.

runs:
  using: composite
  steps:
    - name: Install Solana toolchain
      # The official Solana GitHub Action can be found at:
      # https://github.com/solana-program/actions/tree/main/install-solana
      # However, it doesn't pin dependencies to commit values and it's
      # rejected by CoW's Actions pinning policy.
      # Here we use a simplified version of the commands in the above action.
      env:
        # Bump to upgrade. Releases: https://github.com/anza-xyz/agave/releases
        SOLANA_VERSION: v3.1.14
      shell: bash
      run: |
        sh -c "$(curl -sSfL "https://release.anza.xyz/${SOLANA_VERSION}/install")"
        echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

    - name: Solana version
      shell: bash
      run: solana --version
