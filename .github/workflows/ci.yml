name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-solana
      - uses: ./.github/actions/setup-just
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: just build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-solana
      - uses: ./.github/actions/setup-just
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Test
        # Deterministic tests. Pin the proptest seed so the fuzz tests in
        # `cargo test` replay the same case sequence on every CI run.
        env:
          PROPTEST_RNG_SEED: "0"
        run: just test

  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-just

      - name: Format check
        run: just fmt-check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-just
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Lint
        run: just lint

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Cache the solana-verify binary alongside the normal cargo cache so
          # the install step is a no-op on cache hits.
          cache-directories: ~/.cargo/bin/solana-verify

      # solana-verify is declared as a workspace dev-dependency to pin its
      # version in Cargo.lock. However, Cargo does not build binary targets
      # from dependencies — only library targets — so an explicit install step
      # is still required. The cache-directories setting above makes this a
      # no-op on cache hits.
      - name: Install solana-verify
        run: command -v solana-verify || cargo install solana-verify

      - name: Verify build
        run: solana-verify build --library-name cow_settlement

      - name: Upload program artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cow_settlement
          path: target/deploy/cow_settlement.so
